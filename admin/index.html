<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LithoMATE · Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="login-icon"><i class="fas fa-lock"></i></div>
                <h4 class="fw-bold mt-3 mb-1">Admin Panel</h4>
                <p class="text-muted small">LithoMATE Product Manager</p>
            </div>
            <div id="loginErr" class="alert alert-danger d-none py-2 small">Incorrect username or password.</div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="fas fa-user text-muted"></i></span>
                        <input id="lgUser" type="text" class="form-control border-start-0 ps-0" placeholder="admin"
                            required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-semibold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i
                                class="fas fa-key text-muted"></i></span>
                        <input id="lgPass" type="password" class="form-control border-start-0 ps-0"
                            placeholder="••••••••" required>
                    </div>
                </div>
                <button class="btn btn-primary w-100 py-2 fw-semibold" type="submit">Sign In</button>
            </form>
        </div>
    </div>

    <!-- ═══════════════════ DASHBOARD ═══════════════════ -->
    <div id="dashboard" class="d-none">

        <!-- Topbar -->
        <header class="topbar d-flex align-items-center justify-content-between px-4">
            <div class="d-flex align-items-center gap-3">
                <div class="brand-icon"><i class="fas fa-boxes-stacked"></i></div>
                <div>
                    <span class="fw-bold fs-5">LithoMATE</span>
                    <span class="text-muted ms-2 small">Admin Panel</span>
                </div>
            </div>
            <div class="d-flex gap-2">
                <a href="../index.html" target="_blank" class="btn btn-sm btn-outline-secondary">
                    <i class="fas fa-arrow-up-right-from-square me-1"></i>View Site
                </a>
                <button id="logoutBtn" class="btn btn-sm btn-outline-danger">
                    <i class="fas fa-right-from-bracket me-1"></i>Logout
                </button>
            </div>
        </header>

        <main class="main-container">
            <!-- Summary stats -->
            <div id="statsRow" class="row g-3 mb-4"></div>

            <!-- Table header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex gap-2">
                    <input id="searchInput" type="text" class="form-control form-control-sm"
                        placeholder="Search products…" style="width:220px">
                    <select id="categoryFilter" class="form-select form-select-sm" style="width:160px">
                        <option value="">All Categories</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-sm" id="addBtn">
                    <i class="fas fa-plus me-1"></i>Add Product
                </button>
            </div>

            <div id="saveAlert"></div>

            <!-- Products table -->
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th style="width:50px">#</th>
                                <th style="width:64px">Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Pack</th>
                                <th>Price</th>
                                <th style="width:100px" class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTbody">
                            <tr>
                                <td colspan="7" class="text-center py-5 text-muted">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ═══════════════════ ADD / EDIT MODAL ═══════════════════ -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-2">
                    <form id="productForm" novalidate>
                        <input type="hidden" id="fId">

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label small fw-semibold">Product Name <span
                                        class="text-danger">*</span></label>
                                <input id="fName" class="form-control" required
                                    placeholder="e.g. A5 Note Book 100 Pages">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold">Category <span
                                        class="text-danger">*</span></label>
                                <input id="fCategory" class="form-control" required list="categoryList"
                                    placeholder="Notebooks">
                                <datalist id="categoryList">
                                    <option value="Notebooks">
                                    <option value="Pads">
                                    <option value="Office">
                                    <option value="Paper">
                                    <option value="Maps">
                                    <option value="Drawing">
                                </datalist>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Pack Details <span
                                        class="text-danger">*</span></label>
                                <input id="fPack" class="form-control" required placeholder="12 pcs in a pack">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Price <span
                                        class="text-danger">*</span></label>
                                <input id="fPrice" class="form-control" required placeholder="Rs. 250.00">
                            </div>

                            <div class="col-12">
                                <hr class="my-1">
                                <label class="form-label small fw-semibold">Product Image</label>

                                <!-- Upload tab -->
                                <div class="img-tabs d-flex gap-2 mb-2">
                                    <button type="button" class="btn btn-sm btn-primary" id="tabUpload">Upload
                                        Image</button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary" id="tabUrl">Use
                                        URL</button>
                                </div>

                                <!-- Upload zone -->
                                <div id="uploadZone" class="upload-zone" id="dropZone">
                                    <i class="fas fa-cloud-arrow-up fa-2x text-muted mb-2"></i>
                                    <p class="mb-1 small text-muted">Drag & drop or click to select image</p>
                                    <input type="file" id="fileInput" accept="image/*" class="d-none">
                                    <div id="uploadStatus" class="small text-muted mt-1"></div>
                                </div>

                                <!-- URL input -->
                                <div id="urlZone" class="d-none">
                                    <input id="fImageUrl" class="form-control"
                                        placeholder="https://... or images/photo.jpg">
                                </div>

                                <!-- Preview -->
                                <div id="previewWrap" class="mt-2 d-none">
                                    <img id="imgPreview" src="" class="img-preview rounded">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4 fw-semibold" id="saveBtn">
                        <i class="fas fa-floppy-disk me-1"></i>Save & Publish
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center py-4">
                    <i class="fas fa-triangle-exclamation fa-2x text-danger mb-3"></i>
                    <h6 class="fw-bold">Delete Product?</h6>
                    <p class="text-muted small mb-3">This will be removed from your live site.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button class="btn btn-secondary btn-sm px-3" data-bs-dismiss="modal">Cancel</button>
                        <button class="btn btn-danger btn-sm px-3" id="confirmDeleteBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../products.js"></script>
    <script src="admin.js"></script>
</body>

</html>
